function badge(text, w) {

  return `<div style="display:flex;align-items:center;gap:${Math.round(fs*0.6)}px;margin-top:${Math.round(w*0.02)}px">

// ── VERSUS LAYOUT — Two columns comparing ──

  const pad = Math.round(w * 0.05)

  const oldItems = (data.left || []).map(item => `
    <div style="display:flex;align-items:flex-start;gap:${Math.round(w*0.012)}px;padding:${Math.round(w*0.01)}px 0;font-family:'Poppins',sans-serif;font-size:${itemFS}px;color:rgba(226,217,243,.55);line-height:1.55">

      <span>${item}</span>
    </div>`).join('')

  return `<div style="position:relative;width:${w}px;height:${h}px;overflow:hidden;font-family:'Inter',sans-serif;background:linear-gradient(160deg,#08001a 0%,#13003a 50%,#2e1065 100%)">

    <div style="position:absolute;inset:0;padding:${pad}px ${pad}px ${Math.round(pad*0.7)}px;display:flex;flex-direction:column">
      <div style="position:absolute;top:${pad}px;left:${pad}px">${logo(logoS)}</div>
      <div style="margin-top:${Math.round(w*0.06)}px;text-align:center;margin-bottom:${Math.round(w*0.025)}px">
        <div style="margin-bottom:${Math.round(w*0.012)}px">${badge(data.badge, w)}</div>
        <h1 style="font-family:'Montserrat',sans-serif;font-size:${headFS}px;font-weight:900;color:white;line-height:1.1;margin:0;letter-spacing:-.02em;white-space:pre-line">${data.headline}</h1>

        <div style="flex:1;background:rgba(127,29,29,.08);border:1px solid rgba(127,29,29,.2);border-radius:${Math.round(w*0.018)}px;padding:${Math.round(w*0.025)}px">
          <div style="font-family:'Montserrat',sans-serif;font-size:${colHeadFS}px;font-weight:900;color:rgba(252,165,165,.75);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:${Math.round(w*0.018)}px">${data.leftLabel||'Without RealtyGrind'}</div>

          <div style="font-family:'Montserrat',sans-serif;font-size:${colHeadFS}px;font-weight:900;background:linear-gradient(135deg,#c4b5fd,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:${Math.round(w*0.018)}px">${data.rightLabel||'With RealtyGrind'}</div>

    </div>
  </div>`
}

// ── FOUNDER LAYOUT ──
function renderFounder(data, w, h) {
  const pad = Math.round(w * 0.06)
  const headFS = Math.round(w * 0.052)
  const roleFS = Math.round(w * 0.018)
  const bioFS = Math.round(w * 0.015)
  const logoS = Math.round(w * 0.028)
  const isPortrait = h > w
  const isLandscape = w / h > 1.4

  const headshotSize = isPortrait ? Math.round(w * 0.42) : isLandscape ? Math.round(h * 0.55) : Math.round(w * 0.36)
  const ringWidth = Math.round(headshotSize * 0.025)
  const ringGap = Math.round(headshotSize * 0.02)
  const totalRing = headshotSize + (ringWidth + ringGap) * 2

  if (isLandscape) {
    return `<div style="position:relative;width:${w}px;height:${h}px;overflow:hidden;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#08001a 0%,#13003a 35%,#2e1065 70%,#3b0764 100%)">
      <div style="position:absolute;top:-15%;right:15%;width:${Math.round(w*0.4)}px;height:${Math.round(w*0.4)}px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.12),transparent 70%);filter:blur(${Math.round(w*0.06)}px)"></div>
      <div style="position:absolute;bottom:-20%;left:30%;width:${Math.round(w*0.35)}px;height:${Math.round(w*0.35)}px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.08),transparent 70%);filter:blur(${Math.round(w*0.05)}px)"></div>
      <div style="position:absolute;inset:0;padding:${pad}px;display:flex;align-items:center;gap:${Math.round(w*0.05)}px">
        <div style="position:absolute;top:${pad}px;left:${pad}px">${logo(logoS)}</div>
        <div style="flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-left:${Math.round(w*0.03)}px">
          <div style="width:${totalRing}px;height:${totalRing}px;border-radius:50%;background:conic-gradient(from 0deg,#7c3aed,#a855f7,#c4b5fd,#a855f7,#7c3aed);display:flex;align-items:center;justify-content:center;box-shadow:0 0 ${Math.round(w*0.04)}px rgba(124,58,237,.35)">
            <div style="width:${headshotSize + ringGap*2}px;height:${headshotSize + ringGap*2}px;border-radius:50%;background:#08001a;display:flex;align-items:center;justify-content:center">
              <img src="${data.headshot}" crossorigin="anonymous" style="width:${headshotSize}px;height:${headshotSize}px;border-radius:50%;object-fit:cover;object-position:center 15%;display:block" />
            </div>
          </div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="margin-bottom:${Math.round(w*0.012)}px">${badge(data.badge, w)}</div>
          <h1 style="font-family:'Montserrat',sans-serif;font-size:${headFS}px;font-weight:900;color:white;line-height:1.08;margin:0;letter-spacing:-.02em">${data.headline}</h1>
          <div style="font-family:'Poppins',sans-serif;font-size:${roleFS}px;font-weight:700;color:#a78bfa;margin:${Math.round(w*0.008)}px 0 ${Math.round(w*0.015)}px;letter-spacing:1px;text-transform:uppercase">${data.role}</div>
          <div style="width:${Math.round(w*0.05)}px;height:2px;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:2px;margin-bottom:${Math.round(w*0.012)}px"></div>
          <p style="font-family:'Poppins',sans-serif;font-size:${bioFS}px;font-weight:400;color:rgba(196,181,253,.8);line-height:1.7;margin:0">${data.bio}</p>
          ${ctaBar(w)}
        </div>
      </div>
    </div>`
  }

  const photoTop = isPortrait ? Math.round(h * 0.12) : Math.round(h * 0.08)

  return `<div style="position:relative;width:${w}px;height:${h}px;overflow:hidden;font-family:'Inter',sans-serif;background:linear-gradient(160deg,#08001a 0%,#13003a 30%,#2e1065 65%,#3b0764 100%)">
    <div style="position:absolute;top:10%;right:-15%;width:${Math.round(w*0.5)}px;height:${Math.round(w*0.5)}px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.12),transparent 70%);filter:blur(${Math.round(w*0.06)}px)"></div>
    <div style="position:absolute;bottom:10%;left:-10%;width:${Math.round(w*0.4)}px;height:${Math.round(w*0.4)}px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.08),transparent 70%);filter:blur(${Math.round(w*0.05)}px)"></div>
    <div style="position:absolute;inset:0;padding:${pad}px;display:flex;flex-direction:column;align-items:center">
      <div style="position:absolute;top:${pad}px;left:${pad}px">${logo(logoS)}</div>
      <div style="margin-top:${photoTop}px;display:flex;flex-direction:column;align-items:center;text-align:center;width:100%">
        <div style="width:${totalRing}px;height:${totalRing}px;border-radius:50%;background:conic-gradient(from 0deg,#7c3aed,#a855f7,#c4b5fd,#a855f7,#7c3aed);display:flex;align-items:center;justify-content:center;box-shadow:0 0 ${Math.round(w*0.05)}px rgba(124,58,237,.35);margin-bottom:${Math.round(w*0.03)}px">
          <div style="width:${headshotSize + ringGap*2}px;height:${headshotSize + ringGap*2}px;border-radius:50%;background:#08001a;display:flex;align-items:center;justify-content:center">
            <img src="${data.headshot}" crossorigin="anonymous" style="width:${headshotSize}px;height:${headshotSize}px;border-radius:50%;object-fit:cover;object-position:center 15%;display:block" />
          </div>
        </div>
        <div style="margin-bottom:${Math.round(w*0.012)}px">${badge(data.badge, w)}</div>
        <h1 style="font-family:'Montserrat',sans-serif;font-size:${headFS}px;font-weight:900;color:white;line-height:1.08;margin:0;letter-spacing:-.02em">${data.headline}</h1>
        <div style="font-family:'Poppins',sans-serif;font-size:${roleFS}px;font-weight:700;color:#a78bfa;margin:${Math.round(w*0.008)}px 0 ${Math.round(w*0.015)}px;letter-spacing:1px;text-transform:uppercase">${data.role}</div>
        <div style="width:${Math.round(w*0.06)}px;height:2px;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:2px;margin-bottom:${Math.round(w*0.015)}px"></div>
        <p style="font-family:'Poppins',sans-serif;font-size:${bioFS}px;font-weight:400;color:rgba(196,181,253,.8);line-height:1.7;margin:0;max-width:${Math.round(w*0.82)}px;text-align:center">${data.bio}</p>
        <div style="margin-top:${Math.round(w*0.015)}px">${ctaBar(w)}</div>
      </div>
    </div>
  </div>`
}

// ── Master render ──
function renderGraphic(data, sizeKey) {
  const { w, h } = SIZES[sizeKey]
  switch(data.layout) {
    case 'hero': return renderHero(data, w, h)
    case 'split': return renderSplit(data, w, h)
    case 'dark': return renderDark(data, w, h)
    case 'card': return renderCard(data, w, h)
    case 'gradient': return renderGradient(data, w, h)
    case 'list': return renderList(data, w, h)
    case 'founder': return renderFounder(data, w, h)
    case 'stat': return renderStat(data, w, h)
    case 'quote': return renderQuote(data, w, h)
    case 'testimonial': return renderTestimonial(data, w, h)
    case 'versus': return renderVersus(data, w, h)
    case 'manifesto': return renderManifesto(data, w, h)
    case 'persona': return renderPersona(data, w, h)
    case 'mockup': return renderMockup(data, w, h)
    default: return renderHero(data, w, h)
  }
}

// ── App State ────────────────────────────────────────────────────────
let selectedDay = 0
let selectedSize = 'square'

function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 2500)
}

// ── Download ─────────────────────────────────────────────────────────
async function downloadGraphic(dayIdx, sizeKey) {
  const { w, h } = SIZES[sizeKey]
  const target = document.getElementById('renderTarget')
  target.innerHTML = renderGraphic(DAYS[dayIdx], sizeKey)
  const el = target.firstElementChild

  await new Promise(r => setTimeout(r, 500))
  await new Promise(r => {
    const imgs = el.querySelectorAll('img')
    if (!imgs.length) return r()
    let loaded = 0
    imgs.forEach(img => {
      if (img.complete) { loaded++; if (loaded === imgs.length) r() }
      else { img.onload = img.onerror = () => { loaded++; if (loaded === imgs.length) r() } }
    })
  })

  try {
    const canvas = await html2canvas(el, {
      width: w, height: h, scale: 1,
      useCORS: true, allowTaint: false,
      backgroundColor: '#08001a',
      logging: false,
    })
    const link = document.createElement('a')
    link.download = `realtygrind-day${DAYS[dayIdx].day}-${sizeKey}.png`
    link.href = canvas.toDataURL('image/png')
    link.click()
    return true
  } catch (e) {
    console.error('Export error:', e)
    toast('Export failed — try right-clicking the preview to save')
    return false
  }
}

async function downloadAllSizes(dayIdx) {
  const btn = document.getElementById('dlAllBtn')
  if (btn) { btn.disabled = true; btn.textContent = 'Exporting...' }
  const keys = Object.keys(SIZES)
  for (let i = 0; i < keys.length; i++) {
    const pct = Math.round(((i + 1) / keys.length) * 100)
    const fill = document.getElementById('progressFill')
    if (fill) fill.style.width = pct + '%'
    await downloadGraphic(dayIdx, keys[i])
    await new Promise(r => setTimeout(r, 300))
  }
  if (btn) { btn.disabled = false; btn.textContent = '⬇ Download All 4 Sizes' }
  toast(`All 4 sizes downloaded for Day ${DAYS[dayIdx].day}!`)
}

async function downloadEverything() {
  const btn = document.getElementById('dlEverythingBtn')
  if (btn) { btn.disabled = true; btn.textContent = 'Exporting all 120 graphics...' }
  const keys = Object.keys(SIZES)
  const total = DAYS.length * keys.length
  let done = 0
  for (let d = 0; d < DAYS.length; d++) {
    for (let s = 0; s < keys.length; s++) {
      await downloadGraphic(d, keys[s])
      done++
      const fill = document.getElementById('progressFillAll')
      if (fill) fill.style.width = Math.round((done/total)*100) + '%'
      await new Promise(r => setTimeout(r, 200))
    }
  }
  if (btn) { btn.disabled = false; btn.textContent = '⬇ Download ALL 120 Graphics' }
  toast('All 120 graphics downloaded!')
}

// ── Render App ───────────────────────────────────────────────────────
function renderApp() {
  // Sidebar
  const dayList = document.getElementById('dayList')
  let listHTML = ''
  let currentWeek = 0
  const weekNames = ['','Week 1 · Introduce','Week 2 · Productivity','Week 3 · Marketing','Week 4 · Advanced','Bonus · Meet the Team','Week 6 · Proof & Testimonials','Week 7 · Stats & Math','Week 8 · Versus','Week 9 · Personas','Week 10 · Myths & Manifestos','Week 11 · Quotes','Week 12 · Tactical & Close','Week 13 · 🚀 Beta Launch','Week 14 · 📄 Contract AI','Week 15 · 👥 Seats & Roles','Week 16 · 🔌 MCP Power','Week 17 · ✨ Vibe Building','Week 18 · 💼 Admin Automation','Week 19 · 🎯 Beta Close','Week 20 · 🔗 Public Pages','Week 21 · 🤖 AI SDR + Deals','Week 22 · 📋 Lists & Alerts','Week 23 · 🚀 Agentic Close']
  function dayTitle(d) {
    if (d.headline) return d.headline.split('\n')[0]
    if (d.name) return d.name
    if (d.quote) return '"' + d.quote.substring(0, 24) + '..."'
    if (d.stat) return d.stat + ' ' + (d.label || '')
    return 'Untitled'
  }
  DAYS.forEach((d, i) => {
    if (d.week !== currentWeek) {
      currentWeek = d.week
      listHTML += `<div class="week-divider">${weekNames[d.week]}</div>`
    }
    const shortTitle = dayTitle(d).substring(0, 24)
    listHTML += `<div class="day-item${i===selectedDay?' active':''}" onclick="selectDay(${i})">
      <div class="day-num">${d.day}</div>
      <div class="day-label"><strong>${shortTitle}</strong><small>${d.badge}</small></div>
    </div>`
  })
  dayList.innerHTML = listHTML

  // Main
  const data = DAYS[selectedDay]
  const { w, h } = SIZES[selectedSize]
  const viewW = window.innerWidth < 900 ? window.innerWidth - 80 : window.innerWidth - 380
  const maxW = Math.min(w, Math.min(680, viewW))
  const displayScale = maxW / w
  const displayH = Math.round(h * displayScale)

  const sizeTabs = Object.entries(SIZES).map(([key, s]) =>
    `<button class="size-tab${key===selectedSize?' active':''}" onclick="selectSize('${key}')">${s.label.split('(')[0].trim()}</button>`
  ).join('')

  document.getElementById('main').innerHTML = `
    <div class="main-sticky">
      <div class="main-header">
        <div>
          <div class="main-title">Day ${data.day} — ${dayTitle(data)}</div>
        </div>
        <div class="size-tabs">${sizeTabs}</div>
      </div>

      <div class="preview-wrapper" style="padding:8px 0">
        <div class="preview-container" style="width:${maxW}px;height:${displayH}px">
          <div style="transform:scale(${displayScale});transform-origin:top left;width:${w}px;height:${h}px">
            ${renderGraphic(data, selectedSize)}
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="dl-btn primary" onclick="downloadGraphic(${selectedDay},'${selectedSize}')">⬇ Download ${SIZES[selectedSize].label.split('(')[0].trim()}</button>
      <button class="dl-btn secondary" id="dlAllBtn" onclick="downloadAllSizes(${selectedDay})">⬇ Download All 4 Sizes</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0"></div></div>

    <div class="caption-section">
      <div class="caption-label">Post Caption</div>
      <div class="caption-text">${data.caption}</div>
      <div class="hashtags">${data.tags}</div>
      <button class="copy-btn" onclick="copyCaption(${selectedDay})">📋 Copy Caption + Hashtags</button>
    </div>

    <div class="dl-all-section">
      <button class="dl-all-btn" id="dlEverythingBtn" onclick="downloadEverything()">⬇ Download ALL ${DAYS.length * 4} Graphics (${DAYS.length} days × 4 sizes)</button>
      <div class="progress-bar" style="margin-top:8px;max-width:400px;margin-left:auto;margin-right:auto"><div class="progress-fill" id="progressFillAll" style="width:0"></div></div>
    </div>
  `
}

function selectDay(idx) {
  selectedDay = idx
  renderApp()
  document.querySelector('.day-item.active')?.scrollIntoView({ block: 'nearest' })
}

function selectSize(key) {
  selectedSize = key
  renderApp()
}

function copyCaption(idx) {
  const d = DAYS[idx]
  navigator.clipboard.writeText(d.caption + '\n\n' + d.tags).then(() => toast('Caption copied!'))
}

// ── Init ─────────────────────────────────────────────────────────────
renderApp()
</script>
</body>
</html>
