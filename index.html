// ── Render Functions ─────────────────────────────────────────────────

function logo(size) {
  const s = Math.round(size)
  return `<div style="display:flex;align-items:center;gap:${Math.round(s*0.4)}px">
    <div style="width:${s}px;height:${s}px;border-radius:${Math.round(s*0.25)}px;background:rgba(124,58,237,.9);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);border:1px solid rgba(167,139,250,.3)">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:${Math.round(s*0.55)}px;height:${Math.round(s*0.55)}px"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    </div>
    <span style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:${Math.round(s*0.65)}px;color:white;letter-spacing:-.01em">RealtyGrind</span>
  </div>`
}

function badge(text, w) {
  const fs = Math.round(w * 0.012)
  return `<div style="display:inline-block;padding:${Math.round(fs*0.5)}px ${Math.round(fs*1.2)}px;border-radius:${Math.round(fs*2)}px;background:rgba(124,58,237,.25);border:1px solid rgba(167,139,250,.3);font-size:${Math.max(fs,10)}px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:#c4b5fd;font-family:'Inter',sans-serif;backdrop-filter:blur(4px)">${text}</div>`
}

function ctaBar(w) {
  const fs = Math.round(w * 0.014)
  return `<div style="display:flex;align-items:center;gap:${Math.round(fs*0.6)}px;margin-top:${Math.round(w*0.02)}px">
    <div style="width:${Math.round(fs*0.5)}px;height:${Math.round(fs*0.5)}px;border-radius:50%;background:#a855f7;box-shadow:0 0 12px rgba(168,85,247,.6)"></div>
    <span style="font-size:${Math.max(fs,11)}px;font-weight:700;color:#c4b5fd;letter-spacing:1px;font-family:'Inter',sans-serif">realtygrind.co</span>
  </div>`
}

}

// ── PROFILE LAYOUT — Square, circle-crop-safe profile photo ──
function renderProfile(data, w, h) {
  const variant = data.variant || 'icon'
  const size = Math.min(w, h)
  const inset = Math.round(size * 0.04)
  const safeRadius = Math.round((size - inset * 2) / 2)

  // Background variants
  const bg = data.bgVariant === 'flat'
    ? '#7c3aed'
    : data.bgVariant === 'dark'
    ? 'radial-gradient(circle at center,#3b0764 0%,#1a0544 60%,#08001a 100%)'
    : 'radial-gradient(circle at 30% 30%,#a855f7 0%,#7c3aed 35%,#3b0764 80%,#1a0544 100%)'

  let inner = ''
  if (variant === 'icon') {
    // Big Lucide home icon centered
    const iconSize = Math.round(size * 0.42)
    inner = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:${iconSize}px;height:${iconSize}px;filter:drop-shadow(0 ${Math.round(size*0.01)}px ${Math.round(size*0.02)}px rgba(0,0,0,.3))"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`
  } else if (variant === 'monogram') {
    // "RG" monogram
    const fs = Math.round(size * 0.36)
    inner = `<div style="font-family:'Montserrat',sans-serif;font-weight:900;font-size:${fs}px;color:white;letter-spacing:-.04em;line-height:.9;text-shadow:0 ${Math.round(size*0.008)}px ${Math.round(size*0.02)}px rgba(0,0,0,.3)">RG</div>`
  } else if (variant === 'stacked') {
    // Icon on top, "RealtyGrind" below

// ── Master render ──
function renderGraphic(data, sizeKey) {
  const { w, h } = SIZES[sizeKey]
  switch(data.layout) {
    case 'hero': return renderHero(data, w, h)
    case 'split': return renderSplit(data, w, h)
    case 'dark': return renderDark(data, w, h)
    case 'card': return renderCard(data, w, h)
    case 'gradient': return renderGradient(data, w, h)
    case 'list': return renderList(data, w, h)
    case 'founder': return renderFounder(data, w, h)
    case 'stat': return renderStat(data, w, h)
    case 'quote': return renderQuote(data, w, h)
    case 'testimonial': return renderTestimonial(data, w, h)
    case 'versus': return renderVersus(data, w, h)
    case 'manifesto': return renderManifesto(data, w, h)
    case 'persona': return renderPersona(data, w, h)
    case 'mockup': return renderMockup(data, w, h)
    case 'profile': return renderProfile(data, w, h)
    default: return renderHero(data, w, h)
  }
}

let selectedDay = 0

function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 2500)
}

// ── Download ─────────────────────────────────────────────────────────
async function downloadGraphic(dayIdx, sizeKey) {
  const { w, h } = SIZES[sizeKey]
  const target = document.getElementById('renderTarget')
  target.innerHTML = renderGraphic(DAYS[dayIdx], sizeKey)
  const el = target.firstElementChild

  await new Promise(r => setTimeout(r, 500))
  await new Promise(r => {
    const imgs = el.querySelectorAll('img')
    if (!imgs.length) return r()
    let loaded = 0
    imgs.forEach(img => {
      if (img.complete) { loaded++; if (loaded === imgs.length) r() }
      else { img.onload = img.onerror = () => { loaded++; if (loaded === imgs.length) r() } }
    })
  })

  try {
    const canvas = await html2canvas(el, {
      width: w, height: h, scale: 1,
      useCORS: true, allowTaint: false,
      backgroundColor: '#08001a',
      logging: false,
    })
    const link = document.createElement('a')
    link.download = `realtygrind-day${DAYS[dayIdx].day}-${sizeKey}.png`
    link.href = canvas.toDataURL('image/png')
    link.click()
    return true
  } catch (e) {
    console.error('Export error:', e)
    toast('Export failed — try right-clicking the preview to save')
    return false
  }
}

async function downloadAllSizes(dayIdx) {
  const btn = document.getElementById('dlAllBtn')
  if (btn) { btn.disabled = true; btn.textContent = 'Exporting...' }
  const keys = Object.keys(SIZES)
  for (let i = 0; i < keys.length; i++) {
    const pct = Math.round(((i + 1) / keys.length) * 100)
    const fill = document.getElementById('progressFill')
    if (fill) fill.style.width = pct + '%'
    await downloadGraphic(dayIdx, keys[i])
    await new Promise(r => setTimeout(r, 300))
  }
  if (btn) { btn.disabled = false; btn.textContent = '⬇ Download All 4 Sizes' }
  toast(`All 4 sizes downloaded for Day ${DAYS[dayIdx].day}!`)
}

async function downloadEverything() {
  const btn = document.getElementById('dlEverythingBtn')
  if (btn) { btn.disabled = true; btn.textContent = 'Exporting all 120 graphics...' }
  const keys = Object.keys(SIZES)
  const total = DAYS.length * keys.length
  let done = 0
  for (let d = 0; d < DAYS.length; d++) {
    for (let s = 0; s < keys.length; s++) {
      await downloadGraphic(d, keys[s])
      done++
      const fill = document.getElementById('progressFillAll')
      if (fill) fill.style.width = Math.round((done/total)*100) + '%'
      await new Promise(r => setTimeout(r, 200))
    }
  }
  if (btn) { btn.disabled = false; btn.textContent = '⬇ Download ALL 120 Graphics' }
  toast('All 120 graphics downloaded!')
}

  const data = DAYS[selectedDay]

        <div class="preview-container" style="width:${maxW}px;height:${displayH}px">
          <div style="transform:scale(${displayScale});transform-origin:top left;width:${w}px;height:${h}px">
            ${renderGraphic(data, selectedSize)}
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="dl-btn primary" onclick="downloadGraphic(${selectedDay},'${selectedSize}')">⬇ Download ${SIZES[selectedSize].label.split('(')[0].trim()}</button>
      <button class="dl-btn secondary" id="dlAllBtn" onclick="downloadAllSizes(${selectedDay})">⬇ Download All 4 Sizes</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0"></div></div>

    <div class="caption-section">
      <div class="caption-label">Post Caption</div>
      <div class="caption-text">${data.caption}</div>
      <div class="hashtags">${data.tags}</div>
      <button class="copy-btn" onclick="copyCaption(${selectedDay})">📋 Copy Caption + Hashtags</button>
    </div>

    <div class="dl-all-section">
      <button class="dl-all-btn" id="dlEverythingBtn" onclick="downloadEverything()">⬇ Download ALL ${DAYS.length * 4} Graphics (${DAYS.length} days × 4 sizes)</button>
      <div class="progress-bar" style="margin-top:8px;max-width:400px;margin-left:auto;margin-right:auto"><div class="progress-fill" id="progressFillAll" style="width:0"></div></div>
    </div>
  `
}

function selectDay(idx) {
  selectedDay = idx
  renderApp()
  document.querySelector('.day-item.active')?.scrollIntoView({ block: 'nearest' })
}

function selectSize(key) {
  selectedSize = key
  renderApp()
}

function copyCaption(idx) {
  const d = DAYS[idx]
  navigator.clipboard.writeText(d.caption + '\n\n' + d.tags).then(() => toast('Caption copied!'))
}

// ── Init ─────────────────────────────────────────────────────────────
renderApp()
</script>
</body>
</html>
